<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Path System Converter</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <h1 class="main-title">UNC Path Converter</h1>
        <p class="subtitle">This website automatically reads file path from your clipboard</p>

        <div class="container">
            <div class="settings-group">
                <label>Server Name</label>
                <input type="text" id="server-input" placeholder="\\ServerName" value="" />
            </div>

            <div class="settings-group">
                <label>Mapped Drive(optional)</label>
                <div class="drive-mapping">
                    <select id="drive-letter"></select>
                    <span class="mapping-to">to</span>
                    <input type="text" id="mapped-path" placeholder="\\Server\mapped\path" value="" />
                </div>
            </div>

            <hr class="divider" />

            <button onclick="processPath(1)">Convert to Windows UNC Path</button>
            <button onclick="processPath(2)">Convert to Mapped UNC Path</button>
            <button onclick="processPath(3)">Convert to macOS Path</button>

            <div class="output-box" id="output"></div>
            <div class="status" id="status"></div>
            
            <button id="open-btn" style="visibility: hidden; margin-top: 20px; background-color: #2a2a2c; border-color: rgba(255, 255, 255, 0.1);"></button>
        </div>

        <div id="app-modal" class="modal-overlay">
            <div class="modal-content">
                <h3>Desktop Version Required</h3>
                <p>Opening folder is not supported in browser.<br>Please download the desktop version to use this feature.</p>
                <div class="modal-actions">
                    <button class="close-btn" onclick="closeModal()">Cancel</button>
                    <a href="https://github.com/Oyzariah/unc-to-mac-path-convertor/releases" target="_blank" class="download-btn">Download</a>
                </div>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
